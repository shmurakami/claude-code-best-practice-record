name: Fetch Claude Code Best Practices

on:
  schedule:
    - cron: '0 1 * * *'  # 10:00 AM JST
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch best-practices.md
        shell: bash
        run: |
          curl -fsSL "https://code.claude.com/docs/en/best-practices.md" -o best-practices.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add best-practices.md
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "chore: update best-practices.md"
            git push
          fi
